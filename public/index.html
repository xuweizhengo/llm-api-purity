<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="中转生态人物图鉴：记录 AI API 中转服务背后的公开人物、联系方式与关联站点状态。"
    />
    <meta name="theme-color" content="#191713" />
    <title>中转生态人物图鉴 | 先看人，再选中转站</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="#home" aria-label="中转生态人物图鉴">
        <span>
          <strong>中转生态人物图鉴</strong>
        </span>
      </a>

      <nav class="nav" aria-label="主导航">
        <button class="nav-link" data-route="people" type="button">人物</button>
        <button class="nav-link" data-route="sites" type="button">站点</button>
        <button class="nav-link" data-route="submit" type="button">联系规则</button>
      </nav>

      <div class="top-actions">
        <label class="quick-search">
          <span class="sr-only">快速查证</span>
          <input id="global-search" placeholder="查微信号 / 域名" />
          <span class="search-icon" aria-hidden="true">⌕</span>
        </label>
        <button class="text-link" data-route="submit" type="button">联系 / 更正</button>
      </div>
    </header>

    <main>
      <section class="page active" id="page-home" aria-labelledby="home-title">
        <div id="home-root"></div>
      </section>

      <section class="page" id="page-people" aria-labelledby="people-title">
        <div id="people-root"></div>
      </section>

      <section class="page" id="page-sites" aria-labelledby="sites-title">
        <div id="sites-root"></div>
      </section>

      <section class="page" id="page-detail" aria-labelledby="detail-title">
        <div id="detail-root"></div>
      </section>

      <section class="page" id="page-submit" aria-labelledby="submit-title">
        <div id="submit-root"></div>
      </section>
    </main>

    <footer class="footer">
      <span>仅整理公开信息；更正、认领与下架请求请通过公开联系方式主动联系。</span>
      <span>不是收录最多的中转站，而是帮你看清每个站背后的人。</span>
    </footer>

    <script src="/app.js" type="module"></script>
  </body>
</html>
